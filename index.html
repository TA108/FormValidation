<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validation</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- <script src=".\jquery.js"></script> -->
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            font-size: 130%;
        }
        .eWrapper{
            width: 550px;
            margin: 0 auto;
        }
        label{
            width: 200px;
            float: left;
            position: relative;
            top:12px;
        }
        input{
            width: 320px;
            font-size:25px;
            border:1px solid black;
            border-radius: 5px;
            padding: 5px;
            padding-bottom:12px;
            margin-bottom: 10px;
            
        }
        #submit{
            width: 130px;
            margin-left: 200px;
        }
        #error{
            color: red;
            font-size: 90%;
            display: flex;
            flex-direction: column;
            justify-content: center;     
            align-items: center;  

        }
    </style>
</head>
<body>
    <div id="error">
        <div class="eWrapper">
        <label for="Email">Email:</label>
        <input type="Email" id="Email" name="Email">
        <label for="PhoneNo">Phone No:</label>
        <input type="text" id="PhoneNo" name="PhoneNo">
        <label for="Password">Password:</label>
        <input type="password" id="Password" name="Password">
        <label for="ConfirmPassword">Confirm Password:</label>
        <input type="password" id="ConfirmPassword" name="ConfirmPassword">
        <input type="submit" id="submit">
    </div>
    </div>
<script>
    $("#submit").click(function(e){
        e.preventDefault();
        var errormessage = "";
        var email = $("#Email").val().trim();
        var phone = $("#PhoneNo").val().trim();
        var password = $("#Password").val();
        var confirmPassword = $("#ConfirmPassword").val();

        function validEmail(e) {
            var filter = /^\s*[\w\-\+_]+(\.[\w\-\+_]+)*\@[\w\-\+_]+\.[\w\-\+_]+(\.[\w\-\+_]+)*\s*$/;
            return filter.test(e);
        }

        // Email empty check
        if(email === ""){
            errormessage += "<p>Email ID is not filled</p>";
        } 
        else if(!validEmail(email)){
            errormessage += "<p>Email ID is not valid</p>";
        }

        // Phone number empty and numeric check
        if(phone === ""){
            errormessage += "<p>Phone Number is not filled</p>";
        } 
        else if(!$.isNumeric(phone)){
            errormessage += "<p>Phone Number is not valid</p>";
        }

        // Password empty check
        if(password === "" || confirmPassword === ""){
            errormessage += "<p>Password is not filled</p>";
        } 
        else if(password !== confirmPassword){
            errormessage += "<p>Passwords do not match</p>";
        }

        if(errormessage === ""){
            $("#error").html("<p style='color:green'>You are registered</p>");
        } 
        else {
            $("#error").html(errormessage);
        }
    });
</script>

</body>
</html>
